<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>TechnēCiara</title>
    <link rel="stylesheet" href="game-page.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

<body>
    <div class="logo">
        <img src="../images/bnl.png" height=80px>
    </div>
    <div class="search-and-profile">
        <div class="profile">
            <img src="../images/temppfp.png" id="profile">
        </div>
        <div class="search-bar">
            <span class="material-symbols-outlined">search</span>
            <input type="search" placeholder="Search" class="search">
            <img src="../images/logoonly.png" height="25px">
        </div>
    </div>
    <div class="format-side-and-game-card">
        <div class="side-line"></div>
        <div class="game-cards">
            <div class="game-card">
                <div class="profile-and-name">
                    <div class="profileUser"><img src="../images/tetostpn.jpg" id="penTeto"></div>
                    <div class="username-and-nameofgame">
                        <div class="name"><p style="margin: 0; padding: 0;">matchalover1005 <span class="username">meowmeow09</span></p></div>
                        <div class="nameofgame"><p style="margin: 0; padding: 0;font-weight:bold;font-style:italic; color:rgb(128, 0, 55);">CubeCraft Survival</p></div>
                    </div></div>
                <div class="description">
                    <p>yo i found this really cool game but honestly got bored of it T-T maybe some of y'all will like it tho so here it is</p>
                </div>
                <div class="actual-game">
                    <div class="gamepicture"><img src="../images/cubecraft.png" class="gamepic"></div>
                    <div class="interactions">
                        <div class="likes"><span class="material-symbols-outlined likeThisPost">thumb_up</span></div>
                        <div class="dislike"><span class="material-symbols-outlined dislikeThisPost">thumb_down</span></div>
                        <div class="logoofgame"><img src="../images/cubecraftlogo.png" id="playcubecraft"></div>
                        <div class="comments"><span class="material-symbols-outlined comment">comment</span></div>
                        <div class="bookmark"></div>
                        <div class="report"></div>
                    </div>
                    <div class="message"></div>
                </div>
            </div>
        </div>
    </div>
    
                <div class="commentsYes">
                    <div class="commentsInside">
                        <p>Please click a comment section.</p>
                    </div>
                </div>
    <script src="game-page.js"></script>
</body>
</html>
