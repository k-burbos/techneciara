<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechnēCiara</title>
    <link rel="stylesheet" href="chatroom.css">
    <link rel="icon" type="image/png" href="../images/logoonly.png">
</head>

<body>
    <div class="logo">
        <img src="../images/bnl.png" height=80px>
    </div>
    <div class="header">
        <img src="../images/chatroomheader.png" width=100%>
    </div>
    <div class="main">
        <div class="activelist">
            <div class="activelisttitle">Active Members</div>
            <div class="active"><img src="../images/activepfp.png" class="am"></div>
            <div class="active"><img src="../images/activepfp.png" class="am"></div>
            <div class="active"><img src="../images/activepfp.png" class="am"></div>
            <div class="active"><img src="../images/activepfp.png" class="am"></div>
            <div class="active"><img src="../images/activepfp.png" class="am"></div>
            <div class="active"><img src="../images/activepfp.png" class="am"></div>
            <div class="active"><img src="../images/activepfp.png" class="am"></div>
        </div>
        <div class="actualchat">
            <div class="actualconversation">
                <div class="chatlog">
                    <div class="chat1">
                        <div class="textdiv1">
                            <div class="text1">_________________</div>
                            <div class="text1-1">___________________________</div>
                            <div class="text1">_________________</div>
                        </div>
                        <div class="profilepic1">
                            <img src="../images/temppfp.png" class="pfp1">
                        </div>
                    </div>
                    <div class="chat2">
                        <div class="profilepic1">
                            <img src="../images/temppfp.png" class="pfp1">
                        </div>
                        <div class="textdiv2">
                            <div class="text1">__________________________</div>
                            <div class="text1-1">__________________________</div>
                            <div class="text1">_________________</div>
                        </div>
                    </div>
                    <div class="chat3">
                        <div class="profilepic1">
                            <img src="../images/temppfp.png" class="pfp1">
                        </div>
                        <div class="textdiv2">
                            <div class="text1">__________________________</div>
                            <div class="text1-1">__________________________</div>
                            <div class="text1">_________________</div>
                        </div>
                    </div>
                </div>
                <div class="keyboard">
                    <img src="../images/keyboard.png" width=100%>
                </div>
            </div>
            <div class="bottombar">
                <div class="game">
                    <img src="../images/gameicon.png" class="icon" id="gameplace">
                </div>
                <div class="addagame">
                    <img src="../images/addicon.png" class="icon" id="add">
                </div>
                <div class="searchagame">
                    <img src="../images/searchicon.png" class="excepticon" id="learn">
                </div>
                <div class="community">
                    <img src="../images/communityicon.png" class="icon">
                </div>
            </div>
        </div>
    </div>
    <script src="chatroom.js"></script>
</body>

</html>
