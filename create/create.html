<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechnēCiara</title>
    <link rel="icon" type="image/png" href="../images/logoonly.png">
    <link rel="stylesheet" href="create.css">
</head>

<body>
    <div class="logo">
        <img src="../images/bnl.png" height=80px>
    </div>
    <div class="mainbody">
        <div class="createtitle">
            <p style="margin: 0;padding:0;">Create</p>
        </div>
        <div class="inputshere">
            <input type="text" placeholder="Type of Game">
            <input type="text" placeholder="Title">
            <div class="file-upload">
                <input type="file" id="file" hidden>
                <label for="file" class="upload-btn">
                    <span>Upload file</span>
                    <img src="../images/uploadicon.png" alt="Upload Icon" class="upload-icon"
                        style="height: 60px; width: 70px;">
                </label>
            </div>
        </div>
    </div>
    <div class="bottombar">
        <div class="game">
            <img src="../images/gameicon.png" class="icon" id="gameplace">
        </div>
        <div class="addagame">
            <img src="../images/addicon.png" class="icon" id="add">
        </div>
        <div class="searchagame">
            <img src="../images/searchicon.png" class="excepticon" id="learn">
        </div>
        <div class="community">
            <img src="../images/communityicon.png" class="icon" id="chatroom">
        </div>
    </div>
    <script src="create.js"></script>
</body>

</html>
