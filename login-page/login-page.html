<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login-page.css">
    <title>TechnēCiara</title>
    <link rel="icon" type="image/png" href="../images/logoonly.png">
</head>
<body>
    <div class="business-logo-and-name">
        <img src="../images/bnl.png" id="business-logo">
    </div>
    <div class="login-form">
        <div class="welcome-message">
            <p style="margin: 0;">WELCOME, PLAYER!</p>
        </div>
        <div class="info-form">
            <center><p style="margin-bottom: 0;font-size: 20px; color:#0D3316; font-family: Economica; font-weight: bold;font-size:30px;">Create Player Account</p></center>
            <input type="text" id="name" placeholder="Name">
            <input type="password" id="password" placeholder="Create Password">
            <input type="password" id="confirm" placeholder="Confirm Password">
        </div>
    </div>

    <div class="begin-bttn">
        <button id="beginbttn">BEGIN</button>
    </div>
    <div class="black-screen"></div>
    <div class="alert-screen">
        <p>Please fill in all of the information.</p>
        <button id="understood-bttn">Understood</button>
    </div>
    <script src="login-page.js"></script>
</body>
</html>
